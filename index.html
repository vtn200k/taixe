<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZOZO DRIVER - LIVE GPS</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --green: #00FF88; --orange: #FF8C00; --bg: #000000; --card: #1C1C1E; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }
        
        #toast { position: fixed; top: 45px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #FFD700; color: black; padding: 10px 15px; border-radius: 12px; font-weight: 800; transition: 0.5s; z-index: 9999; font-size: 0.8rem; width: 85%; text-align: center; border: 2px solid #000; }
        #toast.active { transform: translateX(-50%) translateY(0); }

        .status-bar { height: 25px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; font-size: 0.7rem; background: #000; }
        
        .page { display: none; padding: 10px 15px; flex-direction: column; height: calc(100vh - 25px); }
        .active-page { display: flex; }
        
        .logo-text { font-size: 2rem; font-weight: 900; text-align: center; margin-bottom: 10px; }
        .info-card { background: var(--card); padding: 12px; border-radius: 15px; border: 1px solid #333; margin-bottom: 10px; }

        #map-box { width: 100%; height: 35vh; border-radius: 18px; border: 1px solid #333; overflow: hidden; margin-bottom: 10px; position: relative; }
        .km-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 8px; color: var(--green); font-weight: 800; z-index: 1000; font-size: 0.8rem; border: 1px solid var(--green); }
        
        .controls { display: flex; flex-direction: column; gap: 8px; }
        .btn { width: 100%; padding: 18px; border-radius: 18px; font-weight: 900; font-size: 1.1rem; border: none; cursor: pointer; }
        .btn-orange { background: linear-gradient(135deg, #FF4B2B, #FF8C00); color: white; }
        .btn-white { background: white; color: black; }
        .btn-green { background: var(--green); color: black; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 5000; padding: 15px; align-items: center; justify-content: center; }
        .ticket { background: white; color: black; border-radius: 20px; padding: 15px; width: 100%; max-width: 380px; }
    </style>
</head>
<body>

    <div id="toast"><i class="fas fa-satellite-dish"></i> <span id="toast-text">...</span></div>

    <div class="status-bar">
        <span id="sys-time">00:00</span>
        <div><i class="fas fa-wifi"></i> GPS LIVE</div>
    </div>

    <div id="page-1" class="page active-page">
        <div class="logo-text"><span style="color:var(--green)">ZO</span><span style="color:var(--orange)">ZO</span></div>
        <div class="info-card" style="text-align:center;">
            <div style="font-size: 3.5rem; font-weight: 900;" id="big-time">00:00</div>
            <div style="color:var(--green); font-size: 0.8rem; font-weight: 700;">TRẠM ĐIỀU HÀNH TÀI XẾ</div>
        </div>
        <div class="info-card">
            <small style="color:#888;">TÀI XẾ:</small> <b>X</b>
            <small style="color:#888;">XE:</small> <b>88-888.88</b>
        </div>
        <div class="controls">
            <button class="btn btn-orange" onclick="startTrip()">BẮT ĐẦU CHUYẾN</button>
        </div>
    </div>

    <div id="page-2" class="page">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <b id="live-id" style="color:var(--orange); font-size:0.8rem;">ID: ----</b>
            <b id="live-money" style="color:var(--green); font-size: 1.2rem;">0 đ</b>
        </div>
        
        <div id="map-box">
            <div class="km-badge" id="live-km">0.00 KM</div>
            <div id="map" style="width:100%; height:100%;"></div>
        </div>

        <div class="info-card">
            <small style="color:var(--green); font-weight:800">📍 ĐANG DI CHUYỂN TỪ:</small>
            <div id="addr-start" style="font-size:0.7rem; color:#ccc;">Đang xác định...</div>
        </div>

        <div class="controls">
            <button class="btn btn-white" onclick="finishTrip()">ĐẾN NƠI - XUẤT VÉ</button>
        </div>
    </div>

    <div class="overlay" id="bill-overlay">
        <div class="ticket">
            <div style="text-align:center; border-bottom:1px dashed #ccc; padding-bottom:8px; margin-bottom:8px;">
                <b style="font-size:1.2rem;">BIÊN NHẬN DỊCH VỤ</b><br>
                <small id="b-id" style="color:#666;"></small>
            </div>
            <div style="font-size:0.75rem; line-height:1.5;">
                Từ: <b id="b-addr-start"></b><br>
                Đến: <b id="b-addr-end">Đang lấy vị trí...</b><br>
                Km: <b id="b-km"></b> | Phí: <b id="b-price" style="color:red; font-size:1.1rem;"></b>
            </div>
            <div style="text-align:center; margin:10px 0;"><img id="qr-img" src="" style="width:120px;"></div>
            <div class="controls">
                <button class="btn btn-green" id="btn-final-send" onclick="sendReport()">GỬI BÁO CÁO & KẾT THÚC</button>
            </div>
        </div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx4z1xUk7TqlQoPXIf1RZfJOgYG0RdDguHWepHYsqEJqlHmUgpGiTxGJGdPd91NQst6/exec"; 
    const GIA_CUOC = 15000;
    const BIEN_SO = "88-888.88";
    const TEN_TAI_XE ="X";

    let map, marker, path, watchId, km = 0, tripID = "";
    let addrStart = "", addrEnd = "";
    let currentLat, currentLng;
    let lastPoint = null; 
    let gpsBuffer = []; // Bộ đệm để làm mịn đường đi (giống Google Maps)

    // 1. CẬP NHẬT GIỜ HỆ THỐNG
    setInterval(() => {
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        document.getElementById('sys-time').innerText = timeStr;
        if(document.getElementById('big-time')) document.getElementById('big-time').innerText = timeStr;
    }, 1000);

    // 2. LẤY VỊ TRÍ BAN ĐẦU KHI MỞ APP
    navigator.geolocation.getCurrentPosition(async p => {
        currentLat = p.coords.latitude;
        currentLng = p.coords.longitude;
        lastPoint = L.latLng(currentLat, currentLng);
        addrStart = await getAddressText(currentLat, currentLng);
        if(document.getElementById('addr-start')) document.getElementById('addr-start').innerText = addrStart;
    }, () => showToast("❌ LỖI: VUI LÒNG BẬT GPS"), {enableHighAccuracy: true});

    // 3. HÀM LẤY ĐỊA CHỈ TỪ TỌA ĐỘ
    async function getAddressText(lat, lon) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
            const data = await res.json();
            return data.display_name.split(',').slice(0,3).join(',');
        } catch(e) { return "Vị trí GPS (" + lat.toFixed(4) + ")"; }
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        document.getElementById('toast-text').innerText = m;
        t.classList.add('active'); setTimeout(()=>t.classList.remove('active'), 3000);
    }

    function sendLiveGPS(lat, lon, status) {
        const payload = {
            type: "LIVE", time: new Date().toLocaleString('vi-VN'),
            tripID: tripID, driver: TEN_TAI_XE, plate: BIEN_SO,
            lat: lat, lng: lon, addrStart: addrStart, status: status
        };
        fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    }

    // 4. BẮT ĐẦU CHUYẾN ĐI (HÀM QUAN TRỌNG NHẤT)
    function startTrip() {
        if (!currentLat) { showToast("⚠️ ĐANG ĐỊNH VỊ... THỬ LẠI SAU 2 GIÂY"); return; }
        
        tripID = Math.random().toString(36).substring(2, 6).toUpperCase();
        document.getElementById('page-1').classList.remove('active-page');
        document.getElementById('page-2').classList.add('active-page');
        document.getElementById('live-id').innerText = "ID: " + tripID;

        // Khởi tạo bản đồ mượt mà
        if(!map) {
            map = L.map('map', {zoomControl: false, attributionControl: false}).setView([currentLat, currentLng], 17);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([currentLat, currentLng]).addTo(map);
            
            // Vẽ đường nét đậm, bo tròn góc như Google Maps
            path = L.polyline([], {
                color: '#00FF88', 
                weight: 7, 
                opacity: 0.9, 
                lineJoin: 'round', 
                lineCap: 'round',
                smoothFactor: 1.5 
            }).addTo(map);
        }

        km = 0;
        gpsBuffer = []; 
        lastPoint = L.latLng(currentLat, currentLng);
        path.setLatLngs([lastPoint]);
        sendLiveGPS(currentLat, currentLng, "Đang chạy");

        // CHẾ ĐỘ THEO DÕI SIÊU MƯỢT
        watchId = navigator.geolocation.watchPosition(wp => {
            const rawLat = wp.coords.latitude;
            const rawLon = wp.coords.longitude;
            const accuracy = wp.coords.accuracy;

            // Lọc nhiễu: Bỏ qua nếu sai số > 25m (đang ở trong hầm/nhà)
            if (accuracy > 25) return;

            // Thuật toán Trung bình trượt: Lấy 3 điểm để tính 1 điểm chuẩn
            gpsBuffer.push({lat: rawLat, lng: rawLon});
            if (gpsBuffer.length > 3) gpsBuffer.shift(); 
            
            const avgLat = gpsBuffer.reduce((s, x) => s + x.lat, 0) / gpsBuffer.length;
            const avgLon = gpsBuffer.reduce((s, x) => s + x.lng, 0) / gpsBuffer.length;
            const smoothPoint = L.latLng(avgLat, avgLon);

            const dist = lastPoint.distanceTo(smoothPoint);

            // Chỉ vẽ và tính tiền nếu xe thực sự di chuyển (10m - 300m)
            if(dist > 10 && dist < 300) { 
                km += dist / 1000;
                lastPoint = smoothPoint;
                currentLat = avgLat; currentLng = avgLon;

                // Cập nhật lên bản đồ với hiệu ứng trượt
                marker.setLatLng(smoothPoint);
                path.addLatLng(smoothPoint);
                map.panTo(smoothPoint, { animate: true, duration: 0.5 });
                
                document.getElementById('live-km').innerText = km.toFixed(2) + " KM";
                document.getElementById('live-money').innerText = Math.round(km * GIA_CUOC).toLocaleString() + " đ";
                
                sendLiveGPS(avgLat, avgLon, "Đang chạy");
            }
        }, null, {
            enableHighAccuracy: true, 
            maximumAge: 0, 
            timeout: 10000
        });
    }

    // 5. KẾT THÚC CHUYẾN ĐI
    async function finishTrip() {
        if(watchId) navigator.geolocation.clearWatch(watchId);
        showToast("🎯 ĐÃ ĐẾN NƠI - ĐANG LẤY VỊ TRÍ CUỐI...");
        
        let tien = Math.round(km * GIA_CUOC);
        document.getElementById('b-id').innerText = "MÃ CHUYẾN: " + tripID;
        document.getElementById('b-km').innerText = km.toFixed(2) + " km";
        document.getElementById('b-price').innerText = tien.toLocaleString() + " đ";
        document.getElementById('b-addr-start').innerText = addrStart;
        
        document.getElementById('qr-img').src = `https://img.vietqr.io/image/mbbank-0912345678-compact.png?amount=${tien}&addInfo=ZOZO%20${tripID}`;
        document.getElementById('bill-overlay').style.display = 'flex';

        addrEnd = await getAddressText(currentLat, currentLng);
        document.getElementById('b-addr-end').innerText = addrEnd;
    }

    function sendReport() {
        const btn = document.getElementById('btn-final-send');
        btn.disabled = true; btn.innerText = "ĐANG GỬI...";
        
        const finalData = {
            type: "REPORT", time: new Date().toLocaleString('vi-VN'), tripID: tripID, 
            driver: TEN_TAI_XE, plate: BIEN_SO, addrStart: addrStart, addrEnd: addrEnd,
            distance: km.toFixed(2), price: Math.round(km * GIA_CUOC), status: 'Hoàn thành'
        };
        
        fetch(API_URL, {method:'POST', mode:'no-cors', body: JSON.stringify(finalData)})
        .then(() => { alert("ĐÃ KẾT THÚC & GỬI BÁO CÁO!"); location.reload(); })
        .catch(() => { alert("Lỗi mạng!"); btn.disabled = false; });
    }
</script>
</body>
</html>
